server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html (so updates propagate immediately)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Optional: Proxy SharePoint/Teams Excel requests to avoid CORS
    # Uncomment and modify the URL below to match your SharePoint tenant
    #
    # location /api/data {
    #     proxy_pass https://your-tenant.sharepoint.com/sites/your-team/_layouts/15/download.aspx?SourceUrl=/sites/your-team/Shared%20Documents/General/tech-landscape.xlsx;
    #     proxy_set_header Host your-tenant.sharepoint.com;
    #     proxy_ssl_server_name on;
    # }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
